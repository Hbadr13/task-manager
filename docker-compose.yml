version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: tasks
      DB_USER: admin
      DB_PASSWORD: admin123456789
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: tasks
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123456789
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
